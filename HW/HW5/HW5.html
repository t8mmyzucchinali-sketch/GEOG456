<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wildfire Confidence Slider</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"></script>

<script src="Fires.js"></script>

<style>
#map {
    width: 100%;
    height: 500px;
}
</style>
</head>

<body>

<h3 id="daConfidence">Wildfire Confidence: 0</h3>

<input id="confidenceSlider"
       type="range"
       min="0"
       max="100"
       value="0"
       oninput="moveSlider(this.value)">

<div id="map"></div>

<script>

var map = L.map('map').setView([37.8, -96], 4);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
}).addTo(map);

var geojson;

function moveSlider(value) {

    if (geojson) {
        map.removeLayer(geojson);
    }


    document.getElementById('daConfidence').innerHTML =
        "Wildifre Confidence: " + value;


    var filteredFeatures = [];

    for (var i = 0; i < data.features.length; i++) {

        if (data.features[i].properties.CONFIDENCE >= value) {
            filteredFeatures.push(data.features[i]);
        }
    }

    var filteredData = {
        "type": "FeatureCollection",
        "features": filteredFeatures
    };

    geojson = L.geoJson(filteredData, {
        pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
                radius: 6,
                color: "red",
                weight: 1,
                fillOpacity: 0.8
            });
        }
    });

    map.addLayer(geojson);
}

moveSlider(0);

window.onload = function() {
    document.getElementById('confidenceSlider').value = 0;
};

</script>

</body>
</html>
