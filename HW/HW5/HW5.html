<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wildfire Time Slider</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"></script>

<script src="Fires.js"></script>

<style>
#map {
    width: 100%;
    height: 500px;
}
</style>
</head>

<body>

<h3 id="daDate">Date</h3>

<input id="dateSlider"
       type="range"
       min="0"
       max="100"
       oninput="moveSlider(this.value)">

<div id="map"></div>

<script>

var map = L.map('map').setView([37.8, -96], 4);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
}).addTo(map);

var geojson;

document.getElementById("dateSlider").max = data.features.length - 1;

geojson = L.geoJson(data.features[0]).addTo(map);

function moveSlider(value) {

    map.removeLayer(geojson);

    document.getElementById('daDate').innerHTML =
        "Wildfire Date: " + data.features[value].properties.ACQ_DATE;

    geojson = L.geoJson(data.features[value], {
        pointToLayer: function(feature, latlng){
            return L.circleMarker(latlng,{
                radius:6,
                fillColor: feature.properties.CONFIDENCE > 60 ? "green" : "red",
                color:"#000",
                weight:1,
                fillOpacity:0.8
            })
        }
    });

    map.addLayer(geojson);
}

moveSlider(0);

window.onload = function() {
    document.getElementById('dateSlider').value = 0;
};

</script>

</body>
</html>
